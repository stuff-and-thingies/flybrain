imu_gnss_estimator_node:
  ros__parameters:
    init_std_p: 1.0 # initial position uncertainty per axis, m
    init_std_v: 0.5 # initial velocity uncertainty per axis, mps

    # process noise standard deviation, these are continuous time noise
    # densities. To get the actual variance value, they are squared first, then
    # multiplied by dt. Making it independent of update rate
    q_std_p: 0.01 # per position axis, m/sqrt(s)
    q_std_v: 0.5 # per celovity axis, (m/s)/sqrt(s)

    # uncertainty in gnss velocity measurement, m/s
    gnss_vel_sigma: 0.3

    # set to true, px4 doesn't compensate for gravity
    add_gravity: true

    max_attitude_age_s: 0.05

    # slime trail path size
    max_path_size: 3000
